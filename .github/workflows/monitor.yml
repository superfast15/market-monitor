name: Market Monitor

on:
 schedule:
   - cron: '30 13 * * 1-5'
   - cron: '0 16 * * 1-5'
   - cron: '30 18 * * 1-5'
   - cron: '0 20 * * 1-5'
 workflow_dispatch:

jobs:
 monitor:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v3
     - uses: actions/setup-python@v4
       with:
         python-version: '3.11'
     - run: pip install requests
     - name: Run Monitor
       env:
         TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
       run: python monitor.py
