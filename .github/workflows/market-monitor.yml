name: Market Monitor

on:
  schedule:
    # NOTE: cron is always UTC and does NOT adjust for US daylight saving.
    # These times target US market hours during EDT (summer).
    # In EST (winter) they fire one hour earlier in ET.
    - cron: '30 13 * * 1-5'   # ~09:30 ET (open, EDT)
    - cron: '0 16 * * 1-5'    # ~12:00 ET (midday, EDT)
    - cron: '30 18 * * 1-5'   # ~14:30 ET (afternoon, EDT)
    - cron: '0 20 * * 1-5'    # ~16:00 ET (close, EDT)
  workflow_dispatch:

# Prevent two scheduled runs from overlapping and racing on git push.
concurrency:
  group: market-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install 'requests==2.32.3'

      - name: Run Monitor
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python monitor.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update market data"
          # Re-sync with remote before pushing in case it moved, then retry once.
          git pull --rebase --autostash || true
          git push || (git pull --rebase --autostash && git push)
